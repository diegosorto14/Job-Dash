name: Daily FRP Scanner

on:
  schedule:
    - cron: "0 13 * * *"   # 9 AM ET (UTC-4) every day
  workflow_dispatch:         # allows manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: claude/ecstatic-mendel-pcnk0g

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r frp_tracker/frp_tracker/backend/requirements.txt

      - name: Run scanner
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python frp_tracker/frp_tracker/backend/scanner.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frp_tracker/frp_tracker/frontend/src/data/
          git diff --cached --quiet || git commit -m "chore: daily scan update $(date -u '+%Y-%m-%d')"
          git push origin claude/ecstatic-mendel-pcnk0g
