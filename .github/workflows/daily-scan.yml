name: Daily FRP Scanner

on:
  schedule:
    - cron: "0 13 * * *"   # 9 AM ET (UTC-4) every day
  workflow_dispatch:         # allows manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r frp_tracker/backend/requirements.txt
          pip install requests beautifulsoup4 python-dotenv

      - name: Run Gmail parser (auto-status from email)
        env:
          GMAIL_CLIENT_ID:     ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: python frp_tracker/backend/gmail_parser.py
        continue-on-error: true   # don't fail the whole job if Gmail creds missing

      - name: Run job scanner
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python frp_tracker/backend/scanner.py
        continue-on-error: true

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frp_tracker/frontend/src/data/
          git diff --cached --quiet || git commit -m "chore: daily scan + status update $(date -u '+%Y-%m-%d')"
          git push origin main
